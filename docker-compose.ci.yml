services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-bugtracker_db}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-bugtracker_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - bugtracker-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - GRADLE_OPTS=-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-bugtracker_db}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}

      JWT_SECRET: ${JWT_SECRET:-MySuperSuperSuperSecretKeyForJwtSigning1234567890}
      JWT_EXPIRATION_TIME: ${JWT_EXPIRATION_TIME:-3600000}

      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL:-false}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}

      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}

      TG_BOT_TOKEN: ${TG_BOT_TOKEN:-}
      TG_BOT_USERNAME: ${TG_BOT_USERNAME:-}

      OPENAI_KEY: ${OPENAI_KEY:-}

      # CORS настройки - ИСПРАВЛЕНО
      #APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:3000}
      SERVER_PORT: 8080

      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK: ${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK:-WARN}
      LOGGING_LEVEL_UNI_BUGTRACKER: ${LOGGING_LEVEL_UNI_BUGTRACKER:-DEBUG}

      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:-health,info,metrics}
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: ${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:-always}

      # Дополнительные настройки
      APP_CORS_ALLOWED_METHODS: GET,POST,PUT,PATCH,DELETE,OPTIONS
      APP_CORS_ALLOWED_HEADERS: "*"
      APP_CORS_ALLOW_CREDENTIALS: "true"
      APP_CORS_MAX_AGE: "3600"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - backend-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - bugtracker-network
    restart: on-failure

  dashboard:
    build:
      context: ./frontend/dashboard
      dockerfile: Dockerfile
    environment:
      REACT_APP_API_URL: http://localhost:8080/api
      REACT_APP_EXTERNAL_API_URL: http://localhost:8080/api
      REACT_APP_WS_URL: ws://localhost:8080/ws
      REACT_APP_WIDGET_URL: https://edhelielboneflare.github.io/BugTracker/bugtracker.js
      REACT_APP_DEFAULT_PROJECT_ID: test-project-id
      NODE_ENV: production
    depends_on:
      - backend
    ports:
      - "3000:80"
    volumes:
      - dashboard-logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - bugtracker-network
    restart: on-failure

  widget:
    build:
      context: ./frontend/widget
      dockerfile: Dockerfile
    ports:
      - "8081:80"
    volumes:
      - widget-logs:/var/log/nginx
    networks:
      - bugtracker-network
    restart: on-failure

volumes:
  postgres_data:
    driver: local
  backend-logs:
    driver: local
  dashboard-logs:
    driver: local
  widget-logs:
    driver: local

networks:
  bugtracker-network:
    driver: bridge